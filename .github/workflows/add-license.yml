name: Add complete license

on:
  push:
    branches:
      - chore/mvp-release-audit

permissions:
  contents: write

jobs:
  add-license:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/mvp-release-audit
      - name: Add GPL-3.0 license text and remove this workflow
        shell: bash
        run: |
          set -euo pipefail
          cp /usr/share/common-licenses/GPL-3 LICENSE
          git rm .github/workflows/add-license.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add LICENSE
          git commit -m "Add complete GPL-3.0 license text"
          git push origin HEAD:chore/mvp-release-audit
