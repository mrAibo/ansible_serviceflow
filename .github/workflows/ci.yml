name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - ansible_core: "2.15.*"
            python: "3.11"
            integration: false
          - ansible_core: "latest"
            python: "3.12"
            integration: true
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python }}"
      - name: Install ansible-core
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ matrix.ansible_core }}" = latest ]; then
            python -m pip install --disable-pip-version-check -q ansible-core
          else
            python -m pip install --disable-pip-version-check -q "ansible-core==${{ matrix.ansible_core }}"
          fi
      - name: Repository audit
        shell: bash
        run: |
          set -euo pipefail
          test -s LICENSE
          test -s CHANGELOG.md
          test -s docs/ACCEPTANCE.md
          test -s roles/lifecycle/README.md
          test -s roles/lifecycle/meta/argument_specs.yml
          grep -q '^DOCUMENTATION = ' plugins/filter/serviceflow_plan.py
          grep -q '^DOCUMENTATION = ' plugins/filter/serviceflow_features.py
          ! grep -R "see COPYING" plugins
      - name: Python tests
        run: |
          python -m py_compile \
            plugins/filter/serviceflow_plan.py \
            plugins/filter/serviceflow_features.py \
            plugins/modules/log_readiness.py \
            tests/test_serviceflow_plan.py \
            tests/test_serviceflow_features.py \
            tests/test_log_readiness.py
          python tests/test_serviceflow_plan.py
          python tests/test_serviceflow_features.py
          python tests/test_log_readiness.py
      - name: Build and install collection
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build collections
          ansible-galaxy collection build --output-path build
          archive="$(find build -maxdepth 1 -name 'mraibo-serviceflow-*.tar.gz' -print -quit)"
          test -n "$archive"
          ansible-galaxy collection install "$archive" -p collections
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-galaxy collection list mraibo.serviceflow
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-doc -t module mraibo.serviceflow.log_readiness >/dev/null
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-doc -t filter mraibo.serviceflow.serviceflow_plan >/dev/null
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-doc -t filter mraibo.serviceflow.serviceflow_prepare_features >/dev/null
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-doc -t role mraibo.serviceflow.lifecycle >/dev/null
      - name: Installed planner smoke test
        run: |
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook -i localhost, -c local tests/planner_smoke.yml
      - name: Lifecycle syntax checks
        run: |
          for playbook in \
            tests/lifecycle.yml \
            tests/hook_failure.yml \
            tests/readiness_failure.yml \
            tests/log_lifecycle.yml \
            tests/log_readiness_failure.yml \
            tests/feature_readiness.yml \
            tests/plan_only.yml; do
            ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
              ansible-playbook --syntax-check \
                -i tests/lifecycle_inventory.ini \
                "$playbook"
          done
      - name: Ansible sanity
        if: matrix.integration
        shell: bash
        run: |
          set -euo pipefail
          root="$(mktemp -d)/ansible_collections/mraibo/serviceflow"
          mkdir -p "$root"
          cp -a . "$root/"
          cd "$root"
          ansible-test sanity --color no
      - name: Sequential lifecycle integration
        if: matrix.integration
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/serviceflow-integration.log) 2>&1
          trap 'bash tests/systemd_fixture.sh cleanup' EXIT

          bash tests/systemd_fixture.sh setup
          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook -i tests/lifecycle_inventory.ini tests/hook_failure.yml; then
            echo 'expected the failing hook playbook to fail' >&2
            exit 1
          fi
          test "$(systemctl is-active serviceflow-alpha.service)" = active
          test "$(systemctl is-active serviceflow-beta.service)" = active
          test ! -s /tmp/serviceflow-order.log

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=restart

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook --check \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=start
          test "$(systemctl is-active serviceflow-alpha.service || true)" = inactive
          test "$(systemctl is-active serviceflow-beta.service || true)" = inactive

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=start

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/plan_only.yml
          test "$(systemctl is-active serviceflow-alpha.service || true)" = inactive
          test ! -s /tmp/serviceflow-order.log

          bash tests/systemd_fixture.sh reset
          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/readiness_failure.yml; then
            echo 'expected the systemd readiness playbook to fail' >&2
            exit 1
          fi

          bash tests/systemd_fixture.sh reset
          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/readiness_failure.yml \
              -e serviceflow_failure_policy=rollback; then
            echo 'expected rollback readiness playbook to report the original failure' >&2
            exit 1
          fi
          test "$(systemctl is-active serviceflow-alpha.service || true)" = inactive
          test "$(systemctl is-active serviceflow-beta.service || true)" = inactive

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/log_lifecycle.yml

          bash tests/systemd_fixture.sh reset
          bash tests/systemd_fixture.sh suppress-readiness
          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/log_readiness_failure.yml; then
            echo 'expected old-only log readiness to fail' >&2
            exit 1
          fi

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/feature_readiness.yml
      - name: Upload lifecycle diagnostics
        if: failure() && matrix.integration
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-diagnostics
          path: /tmp/serviceflow-integration.log
