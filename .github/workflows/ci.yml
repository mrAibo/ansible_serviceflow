name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ansible-core
        run: python -m pip install --disable-pip-version-check -q ansible-core
      - name: Repository audit
        shell: bash
        run: |
          set -euo pipefail
          test -s LICENSE
          test -s CHANGELOG.md
          test -s docs/ACCEPTANCE.md
          test -s roles/lifecycle/meta/argument_specs.yml
          ! grep -R "see COPYING" plugins
      - name: Planner tests
        run: |
          python -m py_compile \
            plugins/filter/serviceflow_plan.py \
            tests/test_serviceflow_plan.py
          python tests/test_serviceflow_plan.py
      - name: Log readiness tests
        run: |
          python -m py_compile \
            plugins/modules/log_readiness.py \
            tests/test_log_readiness.py
          python tests/test_log_readiness.py
      - name: Build and install collection
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build collections
          ansible-galaxy collection build --output-path build
          archive="$(find build -maxdepth 1 -name 'mraibo-serviceflow-*.tar.gz' -print -quit)"
          test -n "$archive"

          archive_listing="$(mktemp)"
          tar -tzf "$archive" > "$archive_listing"
          for required in \
            LICENSE \
            CHANGELOG.md \
            docs/ACCEPTANCE.md \
            roles/lifecycle/meta/argument_specs.yml; do
            grep -Eq "(^|/)${required}$" "$archive_listing"
          done

          ansible-galaxy collection install "$archive" -p collections
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-galaxy collection list mraibo.serviceflow
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-doc -t module mraibo.serviceflow.log_readiness >/dev/null
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-doc -t role mraibo.serviceflow.lifecycle \
            > /tmp/serviceflow-role-doc.txt
          grep -q serviceflow_action /tmp/serviceflow-role-doc.txt
          grep -q serviceflow_services /tmp/serviceflow-role-doc.txt
      - name: Installed collection planner smoke test
        run: |
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook -i localhost, -c local tests/planner_smoke.yml
      - name: Lifecycle role syntax
        run: |
          for playbook in \
            tests/lifecycle.yml \
            tests/hook_failure.yml \
            tests/readiness_failure.yml \
            tests/log_lifecycle.yml \
            tests/log_readiness_failure.yml; do
            ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
              ansible-playbook --syntax-check \
                -i tests/lifecycle_inventory.ini \
                "$playbook"
          done
      - name: Sequential lifecycle integration
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee /tmp/serviceflow-integration.log) 2>&1
          trap 'bash tests/systemd_fixture.sh cleanup' EXIT

          bash tests/systemd_fixture.sh setup
          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/hook_failure.yml; then
            echo 'expected the failing hook playbook to fail' >&2
            exit 1
          fi
          test "$(systemctl is-active serviceflow-alpha.service)" = active
          test "$(systemctl is-active serviceflow-beta.service)" = active
          test ! -s /tmp/serviceflow-order.log

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=restart
          diff -u \
            <(printf '%s\n' \
              before-stop-beta \
              stop-beta \
              after-stop-beta \
              before-stop-alpha \
              stop-alpha \
              after-stop-alpha \
              before-start-alpha \
              start-alpha \
              after-ready-alpha \
              before-start-beta \
              start-beta \
              after-ready-beta) \
            /tmp/serviceflow-order.log

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook --check \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=start
          test "$(systemctl is-active serviceflow-alpha.service || true)" = inactive
          test "$(systemctl is-active serviceflow-beta.service || true)" = inactive
          test ! -s /tmp/serviceflow-order.log

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=start
          printf '%s\n' \
            before-start-alpha \
            start-alpha \
            after-ready-alpha \
            before-start-beta \
            start-beta \
            after-ready-beta \
            > /tmp/serviceflow-expected.log
          diff -u /tmp/serviceflow-expected.log /tmp/serviceflow-order.log

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=start \
              -e expect_hooks=false
          diff -u /tmp/serviceflow-expected.log /tmp/serviceflow-order.log

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/lifecycle.yml \
              -e requested_action=stop \
              -e expect_hooks=false
          test ! -s /tmp/serviceflow-order.log

          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/readiness_failure.yml; then
            echo 'expected the systemd readiness playbook to fail' >&2
            exit 1
          fi
          test "$(systemctl is-active serviceflow-alpha.service)" = active
          test "$(systemctl is-active serviceflow-beta.service || true)" = inactive
          diff -u <(printf 'start-alpha\n') /tmp/serviceflow-order.log

          bash tests/systemd_fixture.sh reset
          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook --check \
              -i tests/lifecycle_inventory.ini \
              tests/log_lifecycle.yml
          test "$(systemctl is-active serviceflow-alpha.service || true)" = inactive
          test "$(systemctl is-active serviceflow-beta.service || true)" = inactive
          test ! -s /tmp/serviceflow-order.log

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/log_lifecycle.yml
          printf '%s\n' \
            before-start-log-alpha \
            start-alpha \
            after-ready-log-alpha \
            start-beta \
            > /tmp/serviceflow-log-expected.log
          diff -u /tmp/serviceflow-log-expected.log /tmp/serviceflow-order.log

          ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/log_lifecycle.yml \
              -e expect_transition=false
          diff -u /tmp/serviceflow-log-expected.log /tmp/serviceflow-order.log

          bash tests/systemd_fixture.sh reset
          bash tests/systemd_fixture.sh suppress-readiness
          if ANSIBLE_COLLECTIONS_PATH="$PWD/collections" \
            ansible-playbook \
              -i tests/lifecycle_inventory.ini \
              tests/log_readiness_failure.yml; then
            echo 'expected old-only log readiness to fail' >&2
            exit 1
          fi
          test "$(systemctl is-active serviceflow-alpha.service)" = active
          test "$(systemctl is-active serviceflow-beta.service || true)" = inactive
          diff -u <(printf 'start-alpha\n') /tmp/serviceflow-order.log
      - name: Upload lifecycle diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lifecycle-diagnostics
          path: /tmp/serviceflow-integration.log
