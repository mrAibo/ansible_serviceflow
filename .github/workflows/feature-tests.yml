name: Feature tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  features:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -q ansible-core
      - name: Run feature test
        shell: bash
        run: |
          set +e
          python tests/test_serviceflow_features.py > feature-tests.log 2>&1
          rc=$?
          cat feature-tests.log
          exit "$rc"
      - name: Upload feature diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-test-diagnostics
          path: feature-tests.log
          if-no-files-found: error
