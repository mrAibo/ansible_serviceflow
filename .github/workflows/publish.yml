name: Publish to Ansible Galaxy

on:
  push:
    tags:
      - "0.1.0"
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # Build strictly from the tag ref so the artifact matches the release.
          ref: ${{ github.ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: python -m pip install --disable-pip-version-check -q ansible-core

      - name: Build collection from tag
        run: |
          set -euo pipefail
          mkdir -p build
          ansible-galaxy collection build --output-path build
          archive="$(find build -maxdepth 1 -name 'mraibo-serviceflow-*.tar.gz' -print -quit)"
          test -n "$archive"
          echo "ARTIFACT=$archive" >> "$GITHUB_ENV"
          sha256sum "$archive"

      - name: Publish to Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
        run: |
          set -euo pipefail
          ansible-galaxy collection publish \
            "$ARTIFACT" \
            --api-key "$ANSIBLE_GALAXY_TOKEN"
