name: Publish to Ansible Galaxy

on:
  push:
    tags:
      - "0.1.0"
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and publish (must exist)"
        required: false
        default: "0.1.0"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      # When triggered by workflow_dispatch (or if the tag points at a commit
      # that predates this workflow file), build strictly from the named tag
      # so the published artifact matches the release commit.
      - name: Checkout release tag
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || '0.1.0' }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            git fetch --tags --force
            git checkout "$tag"
          fi
          echo "Building from: $(git rev-parse HEAD)"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-core
        run: python -m pip install --disable-pip-version-check -q ansible-core

      - name: Build collection from tag
        run: |
          set -euo pipefail
          mkdir -p build
          ansible-galaxy collection build --output-path build
          archive="$(find build -maxdepth 1 -name 'mraibo-serviceflow-*.tar.gz' -print -quit)"
          test -n "$archive"
          echo "ARTIFACT=$archive" >> "$GITHUB_ENV"
          sha256sum "$archive"

      - name: Publish to Galaxy
        env:
          ANSIBLE_GALAXY_TOKEN: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
        run: |
          set -euo pipefail
          ansible-galaxy collection publish \
            "$ARTIFACT" \
            --api-key "$ANSIBLE_GALAXY_TOKEN"
