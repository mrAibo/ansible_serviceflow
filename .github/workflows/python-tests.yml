name: Python tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -q ansible-core
      - name: Run focused tests
        id: tests
        shell: bash
        run: |
          set +e
          python tests/test_serviceflow_plan.py > planner.log 2>&1
          planner_rc=$?
          python tests/test_log_readiness.py > log-readiness.log 2>&1
          log_rc=$?
          printf 'planner_rc=%s\nlog_rc=%s\n' "$planner_rc" "$log_rc" > status.txt
          cat planner.log
          cat log-readiness.log
          if [ "$planner_rc" -ne 0 ] || [ "$log_rc" -ne 0 ]; then
            exit 1
          fi
      - name: Upload Python diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-test-diagnostics
          path: |
            planner.log
            log-readiness.log
            status.txt
          if-no-files-found: error
