name: Release

on:
  push:
    tags:
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example 0.1.0
        required: true
        type: string
      create_release:
        description: Create or update the GitHub Release
        required: true
        default: false
        type: boolean
      publish_galaxy:
        description: Publish the built artifact to Ansible Galaxy
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'push' && github.ref || inputs.tag }}

      - name: Install release requirements
        run: python3 -m pip install --disable-pip-version-check -q ansible-core

      - name: Validate tag and collection metadata
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          test -s roles/lifecycle/README.md
          grep -q '^DOCUMENTATION = ' plugins/filter/serviceflow_plan.py

          python3 - <<'PY'
          import os
          from pathlib import Path
          import yaml

          tag = os.environ['RELEASE_TAG']
          metadata = yaml.safe_load(Path('galaxy.yml').read_text(encoding='utf-8'))
          version = str(metadata['version'])
          expected_tag = version
          if tag != expected_tag:
              raise SystemExit(
                  f"release tag {tag!r} does not match galaxy.yml version {version!r}"
              )
          archive = f"{metadata['namespace']}-{metadata['name']}-{version}.tar.gz"
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as output:
              output.write(f"archive_name={archive}\n")
              output.write(f"version={version}\n")
          PY

          python3 - <<'PY'
          import os
          from pathlib import Path

          version = os.environ['RELEASE_TAG']
          lines = Path('CHANGELOG.md').read_text(encoding='utf-8').splitlines()
          heading = f"## {version} -"
          start = next((i for i, line in enumerate(lines) if line.startswith(heading)), None)
          if start is None:
              raise SystemExit(f"CHANGELOG.md has no release section for {version}")
          end = next(
              (i for i in range(start + 1, len(lines)) if lines[i].startswith('## ')),
              len(lines),
          )
          notes = [f"# mraibo.serviceflow {version}", ""] + lines[start + 1:end]
          Path('release-notes.md').write_text(
              "\n".join(notes).strip() + "\n",
              encoding='utf-8',
          )
          PY

      - name: Run Python regression tests
        run: |
          python3 -m py_compile \
            plugins/filter/serviceflow_plan.py \
            plugins/modules/log_readiness.py \
            tests/test_serviceflow_plan.py \
            tests/test_log_readiness.py
          python3 tests/test_serviceflow_plan.py
          python3 tests/test_log_readiness.py

      - name: Run Ansible sanity tests
        shell: bash
        run: |
          set -euo pipefail
          root="$(mktemp -d)/ansible_collections/mraibo/serviceflow"
          mkdir -p "$root"
          cp -a . "$root/"
          cd "$root"
          ansible-test sanity --color no

      - name: Build collection
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build collections
          ansible-galaxy collection build --output-path build
          archive="build/${{ steps.metadata.outputs.archive_name }}"
          test -f "$archive"

          archive_listing="$(mktemp)"
          tar -tzf "$archive" > "$archive_listing"
          if grep -Eq '(^|/)(build|collections|acceptance)(/|$)' "$archive_listing"; then
            echo 'Release archive contains ignored local artifacts' >&2
            exit 1
          fi
          grep -Eq '(^|/)roles/lifecycle/README.md$' "$archive_listing"

          ansible-galaxy collection install "$archive" -p collections

      - name: Smoke-test built collection
        env:
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          ANSIBLE_NOCOLOR: '1'
        run: |
          ansible-doc -t role mraibo.serviceflow.lifecycle >/dev/null
          ansible-doc -t filter mraibo.serviceflow.serviceflow_plan >/dev/null
          ansible-doc mraibo.serviceflow.log_readiness >/dev/null
          ansible-playbook -i localhost, -c local tests/planner_smoke.yml

      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          cd build
          sha256sum "${{ steps.metadata.outputs.archive_name }}" > SHA256SUMS

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: serviceflow-${{ env.RELEASE_TAG }}
          path: |
            build/${{ steps.metadata.outputs.archive_name }}
            build/SHA256SUMS
            release-notes.md
          if-no-files-found: error
          retention-days: 30

  github-release:
    needs: build
    if: github.event_name == 'push' || inputs.create_release
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      RELEASE_TAG: ${{ github.event_name == 'push' && github.ref_name || inputs.tag }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: serviceflow-${{ env.RELEASE_TAG }}
          path: release

      - name: Create or update GitHub Release
        shell: bash
        run: |
          set -euo pipefail
          archive="$(find release -type f -name 'mraibo-serviceflow-*.tar.gz' -print -quit)"
          checksum="$(find release -type f -name SHA256SUMS -print -quit)"
          notes="$(find release -type f -name release-notes.md -print -quit)"
          test -n "$archive"
          test -n "$checksum"
          test -n "$notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$archive" "$checksum" --clobber
          else
            gh release create "$RELEASE_TAG" \
              "$archive" "$checksum" \
              --verify-tag \
              --title "mraibo.serviceflow $RELEASE_TAG" \
              --notes-file "$notes"
          fi

  galaxy:
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.publish_galaxy
    runs-on: ubuntu-24.04
    environment: galaxy
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      GALAXY_TOKEN: ${{ secrets.ANSIBLE_GALAXY_TOKEN }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: serviceflow-${{ env.RELEASE_TAG }}
          path: release

      - name: Publish to Ansible Galaxy
        shell: bash
        run: |
          set -euo pipefail
          test -n "$GALAXY_TOKEN" || {
            echo 'ANSIBLE_GALAXY_TOKEN is not configured in the galaxy environment or repository secrets' >&2
            exit 1
          }
          python3 -m pip install --disable-pip-version-check -q ansible-core
          archive="$(find release -type f -name 'mraibo-serviceflow-*.tar.gz' -print -quit)"
          test -n "$archive"
          ansible-galaxy collection publish "$archive" --token "$GALAXY_TOKEN"
