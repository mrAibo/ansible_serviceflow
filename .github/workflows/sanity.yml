name: Sanity

on:
  pull_request:

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --disable-pip-version-check -q ansible-core
      - name: Run sanity
        shell: bash
        run: |
          set +e
          root="$(mktemp -d)/ansible_collections/mraibo/serviceflow"
          mkdir -p "$root"
          tar --exclude=.git --exclude=build --exclude=collections -cf - . | tar -xf - -C "$root"
          cd "$root"
          ansible-test sanity --color no > "$GITHUB_WORKSPACE/sanity.log" 2>&1
          rc=$?
          cat "$GITHUB_WORKSPACE/sanity.log"
          exit "$rc"
      - name: Upload sanity diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanity-diagnostics
          path: sanity.log
          if-no-files-found: error
