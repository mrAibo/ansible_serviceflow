name: Verify Galaxy 0.2.0

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      VERIFIED_TAG: 0.2.0-verified
      RELEASE_TARGET_SHA: b1a5c6eee709fba941e1c320cb9e7c2a66717981
    steps:
      - name: Install Ansible
        run: python3 -m pip install --disable-pip-version-check -q ansible-core

      - name: Download exact Galaxy release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p downloaded
          cd downloaded
          ansible-galaxy collection download mraibo.serviceflow:==0.2.0
          test -f mraibo-serviceflow-0.2.0.tar.gz

      - name: Mark verified release
        shell: bash
        run: |
          set -euo pipefail
          if ! gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERIFIED_TAG}" >/dev/null 2>&1; then
            gh api --method POST "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/${VERIFIED_TAG}" \
              -f sha="${RELEASE_TARGET_SHA}" >/dev/null
          fi
