---
argument_specs:
  main:
    short_description: Execute an ordered systemd service lifecycle
    description:
      - Validates and executes ordered start, reverse-order stop, or full restart phases.
      - Resolves service targets from Ansible inventory groups and processes them sequentially.
      - Supports transition-aware hooks and systemd, log, port, HTTP, or journal readiness.
    options:
      serviceflow_action:
        description: Lifecycle action to execute.
        type: str
        choices:
          - start
          - stop
          - restart
        default: start
      serviceflow_services:
        description:
          - Ordered service definitions.
          - The list order is the start order; stop uses the exact reverse order.
        type: list
        elements: dict
        required: true
        options:
          name:
            description: Unique logical service name used in results and hook context.
            type: str
            required: true
          unit:
            description: systemd unit name managed through ansible.builtin.systemd_service.
            type: str
            required: true
          groups:
            description:
              - Inventory groups whose hosts run the unit.
              - Hosts from all groups are merged and deduplicated in stable order.
            type: list
            elements: str
            required: true
          exclude_groups:
            description: Inventory groups whose hosts are removed after positive group resolution.
            type: list
            elements: str
            default: []
          manage:
            description:
              - Whether the complete service entry is managed.
              - The value must already evaluate to a boolean.
            type: bool
            default: true
          hooks:
            description: Native task-file hooks keyed by lifecycle phase.
            type: dict
            options:
              before_start:
                description: Task-file hooks executed before a required start transition.
                type: list
                elements: dict
                options: &hook_options
                  name:
                    description: Descriptive hook name used in output and results.
                    type: str
                  tasks:
                    description: Task-file path resolved from playbook_dir when relative.
                    type: path
                    required: true
                  vars:
                    description:
                      - Values exposed to the task file as serviceflow_hook_vars.
                      - Values and names are omitted from public lifecycle plans.
                    type: dict
                    default: {}
              after_start:
                description: Task-file hooks executed after a real start and before readiness.
                type: list
                elements: dict
                options: *hook_options
              before_stop:
                description: Task-file hooks executed before a required stop transition.
                type: list
                elements: dict
                options: *hook_options
              after_ready:
                description: Task-file hooks executed after successful readiness for a real start transition.
                type: list
                elements: dict
                options: *hook_options
              after_stop:
                description: Task-file hooks executed after a successful real stop transition.
                type: list
                elements: dict
                options: *hook_options
          ready:
            description:
              - Optional readiness definition.
              - Type-specific fields are validated before the first service transition.
            type: dict
            options:
              type:
                description: Readiness implementation.
                type: str
                required: true
                choices:
                  - systemd
                  - log
                  - port
                  - http
                  - journal
              active_state:
                description: Expected systemd ActiveState for systemd readiness.
                type: str
                default: active
              sub_state:
                description: Optional expected systemd SubState for systemd readiness.
                type: str
              path:
                description: Absolute application log path for log readiness.
                type: path
              regex:
                description: Regular expression for log or journal readiness.
                type: str
              host:
                description: Host address tested from the managed service host for port readiness.
                type: str
                default: 127.0.0.1
              port:
                description: TCP port required for port readiness.
                type: int
              url:
                description: URL requested for HTTP readiness.
                type: str
              method:
                description: HTTP method used for readiness.
                type: str
                default: GET
              status_code:
                description: Accepted HTTP status code or list of codes.
                type: raw
                default:
                  - 200
              content_regex:
                description: Optional expression that must match the HTTP response body.
                type: str
              headers:
                description:
                  - Optional HTTP headers.
                  - Header names and values are removed from the public plan.
                type: dict
                default: {}
              user:
                description: Optional HTTP username omitted from public results.
                type: str
              password:
                description: Optional HTTP password omitted from public results.
                type: str
              validate_certs:
                description: Validate TLS certificates for HTTP readiness.
                type: bool
                default: true
              unit:
                description: Optional journal unit override; defaults to the managed unit.
                type: str
              timeout:
                description: Maximum readiness wait in seconds.
                type: int
                default: 60
              interval:
                description:
                  - Polling interval in seconds.
                  - Defaults to 2 for systemd readiness and 1 for other readiness types.
                  - Must not exceed timeout.
                type: int
      serviceflow_become:
        description: Use privilege escalation for service, hook, readiness, and rollback operations.
        type: bool
        default: true
      serviceflow_show_plan:
        description:
          - Display the redacted public lifecycle plan.
          - Hook variables and HTTP credentials or headers are never included.
        type: bool
        default: false
      serviceflow_plan_only:
        description:
          - Validate configuration and hook files, expose the redacted plan, and perform no lifecycle operations.
          - This is independent of Ansible check mode.
        type: bool
        default: false
      serviceflow_failure_policy:
        description:
          - Failure behavior after a lifecycle operation fails.
          - Rollback restores only transitions changed by the current run, in reverse order.
        type: str
        choices:
          - fail
          - rollback
        default: fail
