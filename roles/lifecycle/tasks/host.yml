---
- name: Preview {{ serviceflow_phase.action }} for {{ serviceflow_current_service.unit }} on {{ serviceflow_target_host }}
  ansible.builtin.systemd_service:
    name: "{{ serviceflow_current_service.unit }}"
    state: "{{ 'started' if serviceflow_phase.action == 'start' else 'stopped' }}"
  delegate_to: "{{ serviceflow_target_host }}"
  become: "{{ serviceflow_become }}"
  check_mode: true
  register: serviceflow_preview_result

- name: Determine lifecycle transition and initial state
  ansible.builtin.set_fact:
    serviceflow_transition_needed: "{{ serviceflow_preview_result.changed | bool }}"
    serviceflow_initial_active_state: >-
      {{
        (serviceflow_preview_result.status | default({})).get(
          'ActiveState',
          'unknown'
        )
      }}
    serviceflow_initial_sub_state: >-
      {{
        (serviceflow_preview_result.status | default({})).get(
          'SubState',
          'unknown'
        )
      }}

- name: Run hooks before the service transition
  ansible.builtin.include_tasks: hooks.yml
  vars:
    serviceflow_hook_phase: >-
      {{
        'before_start'
        if serviceflow_phase.action == 'start'
        else 'before_stop'
      }}
  when:
    - serviceflow_transition_needed | bool
    - not ansible_check_mode

- name: Capture log readiness boundary before start
  mraibo.serviceflow.log_readiness:
    action: capture
    path: "{{ serviceflow_current_service.ready.path }}"
  delegate_to: "{{ serviceflow_target_host }}"
  become: "{{ serviceflow_become }}"
  register: serviceflow_log_boundary_result
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'log'
    - serviceflow_transition_needed | bool
    - not ansible_check_mode

- name: Capture journal readiness cursor before start
  ansible.builtin.command:
    argv:
      - journalctl
      - "--unit={{ serviceflow_current_service.ready.unit }}"
      - --lines=0
      - --show-cursor
      - --no-pager
  delegate_to: "{{ serviceflow_target_host }}"
  become: "{{ serviceflow_become }}"
  check_mode: false
  changed_when: false
  register: serviceflow_journal_boundary_result
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'journal'
    - serviceflow_transition_needed | bool
    - not ansible_check_mode

- name: Store journal readiness cursor
  ansible.builtin.set_fact:
    serviceflow_journal_cursor: >-
      {{
        (
          serviceflow_journal_boundary_result.stdout_lines
          | select('match', '^-- cursor: ')
          | first
        )
        | regex_replace('^-- cursor: ', '')
      }}
  when:
    - serviceflow_journal_boundary_result is defined
    - serviceflow_journal_boundary_result is not skipped

- name: "{{ serviceflow_phase.action | capitalize }} {{ serviceflow_current_service.unit }} on {{ serviceflow_target_host }}"
  ansible.builtin.systemd_service:
    name: "{{ serviceflow_current_service.unit }}"
    state: "{{ 'started' if serviceflow_phase.action == 'start' else 'stopped' }}"
  delegate_to: "{{ serviceflow_target_host }}"
  become: "{{ serviceflow_become }}"
  register: serviceflow_systemd_result
  when: not ansible_check_mode

- name: Track transition changed by this run
  ansible.builtin.set_fact:
    _serviceflow_changed_transitions: >-
      {{
        _serviceflow_changed_transitions
        + [
            {
              'service': serviceflow_current_service.name,
              'unit': serviceflow_current_service.unit,
              'host': serviceflow_target_host,
              'initial_active_state': serviceflow_initial_active_state,
              'initial_sub_state': serviceflow_initial_sub_state,
              'phase_action': serviceflow_phase.action
            }
          ]
      }}
  when:
    - not ansible_check_mode
    - serviceflow_systemd_result.changed | bool

- name: Read final systemd state
  ansible.builtin.command:
    argv:
      - systemctl
      - show
      - --property=ActiveState
      - --property=SubState
      - --no-pager
      - "{{ serviceflow_current_service.unit }}"
  delegate_to: "{{ serviceflow_target_host }}"
  become: "{{ serviceflow_become }}"
  check_mode: false
  changed_when: false
  register: serviceflow_final_state_result
  when: not ansible_check_mode

- name: Store final systemd state
  ansible.builtin.set_fact:
    serviceflow_final_active_state: >-
      {{
        (
          serviceflow_final_state_result.stdout_lines
          | select('match', '^ActiveState=')
          | first
        ).split('=', 1)[1]
      }}
    serviceflow_final_sub_state: >-
      {{
        (
          serviceflow_final_state_result.stdout_lines
          | select('match', '^SubState=')
          | first
        ).split('=', 1)[1]
      }}
  when: not ansible_check_mode

- name: Run hooks immediately after start
  ansible.builtin.include_tasks: hooks.yml
  vars:
    serviceflow_hook_phase: after_start
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_transition_needed | bool
    - not ansible_check_mode

- name: Verify systemd readiness after start
  ansible.builtin.include_tasks: readiness.yml
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'systemd'
    - not ansible_check_mode

- name: Verify log readiness after start
  ansible.builtin.include_tasks: log_readiness.yml
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'log'
    - not ansible_check_mode

- name: Verify port readiness after start
  ansible.builtin.include_tasks: port_readiness.yml
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'port'
    - not ansible_check_mode

- name: Verify HTTP readiness after start
  ansible.builtin.include_tasks: http_readiness.yml
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'http'
    - not ansible_check_mode

- name: Verify journal readiness after start
  ansible.builtin.include_tasks: journal_readiness.yml
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_current_service.ready.type == 'journal'
    - not ansible_check_mode

- name: Run hooks after readiness
  ansible.builtin.include_tasks: hooks.yml
  vars:
    serviceflow_hook_phase: after_ready
  when:
    - serviceflow_phase.action == 'start'
    - serviceflow_current_service.ready is not none
    - serviceflow_transition_needed | bool
    - not ansible_check_mode

- name: Run hooks after the stop transition
  ansible.builtin.include_tasks: hooks.yml
  vars:
    serviceflow_hook_phase: after_stop
  when:
    - serviceflow_phase.action == 'stop'
    - serviceflow_transition_needed | bool
    - not ansible_check_mode

- name: Record lifecycle operation
  ansible.builtin.set_fact:
    serviceflow_result: >-
      {{
        serviceflow_result
        | combine(
            {
              'processed': serviceflow_result.processed
              + [
                  {
                    'action': serviceflow_phase.action,
                    'service': serviceflow_current_service.name,
                    'unit': serviceflow_current_service.unit,
                    'host': serviceflow_target_host,
                    'changed': (
                      serviceflow_preview_result.changed | bool
                      if ansible_check_mode
                      else serviceflow_systemd_result.changed | bool
                    ),
                    'predicted_change': serviceflow_preview_result.changed | bool,
                    'transition_needed': serviceflow_transition_needed | bool,
                    'initial_active_state': serviceflow_initial_active_state,
                    'initial_sub_state': serviceflow_initial_sub_state,
                    'desired_active_state': (
                      'active' if serviceflow_phase.action == 'start' else 'inactive'
                    ),
                    'final_active_state': (
                      none if ansible_check_mode else serviceflow_final_active_state
                    ),
                    'final_sub_state': (
                      none if ansible_check_mode else serviceflow_final_sub_state
                    ),
                    'check_mode': ansible_check_mode | bool
                  }
                ]
            }
          )
      }}
