---
- name: Validate hook files for lifecycle services
  ansible.builtin.include_tasks: preflight_service.yml
  loop: >-
    {{
      _serviceflow_execution_plan.phases
      | map(attribute='services')
      | flatten
      | unique(attribute='name')
    }}
  loop_control:
    loop_var: serviceflow_preflight_service
    label: "{{ serviceflow_preflight_service.name }}"
