---
- name: Verify ServiceFlow lifecycle execution
  hosts: orchestrator
  gather_facts: false
  vars:
    serviceflow_action: "{{ requested_action | default('restart') }}"
    hooks_expected: "{{ expect_hooks | default(true) | bool }}"
    serviceflow_services:
      - name: alpha
        groups:
          - alpha
        unit: serviceflow-alpha.service
        ready:
          type: systemd
          active_state: active
          sub_state: exited
          timeout: 5
          interval: 1
        hooks:
          before_start:
            - name: Record alpha before start
              tasks: hooks/record.yml
              vars:
                hook_marker: before-start-alpha
          after_ready:
            - name: Record alpha after readiness
              tasks: hooks/record.yml
              vars:
                hook_marker: after-ready-alpha
          before_stop:
            - name: Record alpha before stop
              tasks: hooks/record.yml
              vars:
                hook_marker: before-stop-alpha
          after_stop:
            - name: Record alpha after stop
              tasks: hooks/record.yml
              vars:
                hook_marker: after-stop-alpha
      - name: beta
        groups:
          - beta
        unit: serviceflow-beta.service
        ready:
          type: systemd
          active_state: active
          sub_state: exited
          timeout: 5
          interval: 1
        hooks:
          before_start:
            - name: Record beta before start
              tasks: hooks/record.yml
              vars:
                hook_marker: before-start-beta
          after_ready:
            - name: Record beta after readiness
              tasks: hooks/record.yml
              vars:
                hook_marker: after-ready-beta
          before_stop:
            - name: Record beta before stop
              tasks: hooks/record.yml
              vars:
                hook_marker: before-stop-beta
          after_stop:
            - name: Record beta after stop
              tasks: hooks/record.yml
              vars:
                hook_marker: after-stop-beta
    expected_actions:
      start:
        - start
        - start
      stop:
        - stop
        - stop
      restart:
        - stop
        - stop
        - start
        - start
    expected_services:
      start:
        - alpha
        - beta
      stop:
        - beta
        - alpha
      restart:
        - beta
        - alpha
        - alpha
        - beta
    expected_hosts:
      start:
        - alpha
        - beta
      stop:
        - beta
        - alpha
      restart:
        - beta
        - alpha
        - alpha
        - beta
    expected_hook_phases:
      start:
        - before_start
        - after_ready
        - before_start
        - after_ready
      stop:
        - before_stop
        - after_stop
        - before_stop
        - after_stop
      restart:
        - before_stop
        - after_stop
        - before_stop
        - after_stop
        - before_start
        - after_ready
        - before_start
        - after_ready
    expected_hook_services:
      start:
        - alpha
        - alpha
        - beta
        - beta
      stop:
        - beta
        - beta
        - alpha
        - alpha
      restart:
        - beta
        - beta
        - alpha
        - alpha
        - alpha
        - alpha
        - beta
        - beta
    effective_hook_phases: >-
      {{
        []
        if ansible_check_mode or not hooks_expected
        else expected_hook_phases[serviceflow_action]
      }}
    effective_hook_services: >-
      {{
        []
        if ansible_check_mode or not hooks_expected
        else expected_hook_services[serviceflow_action]
      }}
    effective_readiness_services: >-
      {{
        []
        if ansible_check_mode or serviceflow_action == 'stop'
        else ['alpha', 'beta']
      }}
  roles:
    - role: mraibo.serviceflow.lifecycle
  tasks:
    - name: Verify structured lifecycle result
      ansible.builtin.assert:
        that:
          - serviceflow_result.action == serviceflow_action
          - serviceflow_result.check_mode | bool == ansible_check_mode
          - serviceflow_result.processed | map(attribute='action') | list == expected_actions[serviceflow_action]
          - serviceflow_result.processed | map(attribute='service') | list == expected_services[serviceflow_action]
          - serviceflow_result.processed | map(attribute='host') | list == expected_hosts[serviceflow_action]
          - serviceflow_result.hooks | map(attribute='phase') | list == effective_hook_phases
          - serviceflow_result.hooks | map(attribute='service') | list == effective_hook_services
          - serviceflow_result.readiness | map(attribute='service') | list == effective_readiness_services
          - serviceflow_result.readiness | map(attribute='active_state') | unique | list in [[], ['active']]
          - serviceflow_result.readiness | map(attribute='sub_state') | unique | list in [[], ['exited']]
          - serviceflow_result.skipped == []
