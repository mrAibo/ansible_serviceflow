---
- name: Verify installed ServiceFlow planner
  hosts: localhost
  gather_facts: false
  vars:
    planner_groups:
      backend:
        - backend01
      frontend:
        - frontend01
        - shared01
      edge:
        - shared01
        - edge01
    planner_services:
      - name: backend
        groups:
          - backend
        unit: example-backend.service
      - name: frontend
        groups:
          - frontend
          - edge
        unit: example-frontend.service
  tasks:
    - name: Build restart plan
      ansible.builtin.set_fact:
        planner_result: >-
          {{
            planner_services
            | mraibo.serviceflow.serviceflow_plan(
                planner_groups,
                'restart'
              )
          }}

    - name: Verify phases, order and host deduplication
      ansible.builtin.assert:
        that:
          - planner_result.phases | map(attribute='action') | list == ['stop', 'start']
          - planner_result.phases[0].services | map(attribute='name') | list == ['frontend', 'backend']
          - planner_result.phases[1].services | map(attribute='name') | list == ['backend', 'frontend']
          - planner_result.phases[1].services[1].hosts == ['frontend01', 'shared01', 'edge01']
          - planner_result.skipped == []
