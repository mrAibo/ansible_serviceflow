---
- name: Verify installed ServiceFlow planner
  hosts: localhost
  gather_facts: false
  vars:
    planner_groups:
      backend:
        - backend01
      frontend:
        - frontend01
        - shared01
      edge:
        - shared01
        - edge01
    planner_services:
      - name: backend
        groups:
          - backend
        unit: example-backend.service
      - name: frontend
        groups:
          - frontend
          - edge
        unit: example-frontend.service
  tasks:
    - name: Build restart plan
      ansible.builtin.set_fact:
        planner_result: >-
          {{
            planner_services
            | mraibo.serviceflow.serviceflow_plan(
                planner_groups,
                'restart'
              )
          }}

    - name: Build concise start plan
      ansible.builtin.set_fact:
        concise_result: >-
          {{
            [
              {
                'unit': 'example-worker.service',
                'groups': 'backend',
                'ready': {'type': 'systemd'}
              },
              {
                'name': 'background-worker',
                'unit': 'example-worker@42.service',
                'groups': ['frontend'],
                'exclude_groups': 'edge'
              }
            ]
            | mraibo.serviceflow.serviceflow_plan(
                planner_groups,
                'start'
              )
          }}

    - name: Verify phases, order and input normalization
      ansible.builtin.assert:
        that:
          - planner_result.phases | map(attribute='action') | list == ['stop', 'start']
          - planner_result.phases[0].services | map(attribute='name') | list == ['frontend', 'backend']
          - planner_result.phases[1].services | map(attribute='name') | list == ['backend', 'frontend']
          - planner_result.phases[1].services[1].hosts == ['frontend01', 'shared01', 'edge01']
          - planner_result.skipped == []
          - concise_result.phases[0].services[0].name == 'example-worker'
          - concise_result.phases[0].services[0].hosts == ['backend01']
          - concise_result.phases[0].services[0].ready.active_state == 'active'
          - concise_result.phases[0].services[0].ready.timeout == 60
          - concise_result.phases[0].services[1].name == 'background-worker'
          - concise_result.phases[0].services[1].hosts == ['frontend01']
